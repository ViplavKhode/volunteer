cors:
  allowed-origin: <application-url>
  allowed-headers: Authorization
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  credentials: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/saayam
    username: <username>
    password: <password>
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

# ── Profile Pic Upload (shared across AWS) ─────────────────────────────
saayam:
  s3:
    regions:
      eu: "eu-west-1"   # Ireland
      us: "us-east-1"   # N. Virginia
    buckets:
      euPrivate: "saayam-ireland-private-devsuraj"
      usPrivate: "saayam-virginia-private-devsuraj"

    presign:
      getTtlSeconds: 300
      putTtlSeconds: 300
    maxBytes: 5242880 # 5 MB
    allowedMime: "image/jpeg,image/png,image/webp"            # enforce JPG
    keyPattern: "users/%s/profile.jpg"   # exact path