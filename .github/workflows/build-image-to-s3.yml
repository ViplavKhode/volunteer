name: Build Docker image and upload to S3 (sha + latest split)

on:
  push:
    branches: [ "SathwikB_automate_dockerimgpush" ]
  pull_request:
    branches: [ "SathwikB_automate_dockerimgpush" ]
  workflow_dispatch:

env:
  APP_NAME: volunteer-app
  AWS_REGION: us-east-1
  S3_BUCKET: saayam-virginia-private

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha_short=$SHA" >> $GITHUB_OUTPUT
          echo "archive=${{ env.APP_NAME }}-${SHA}.tar.gz" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ env.APP_NAME }}:${{ steps.vars.outputs.sha_short }} -t ${{ env.APP_NAME }}:latest .

      - name: Save image as .tar.gz
        run: |
          docker save ${{ env.APP_NAME }}:${{ steps.vars.outputs.sha_short }} | gzip > ${{ steps.vars.outputs.archive }}

      - name: Generate checksum
        run: |
          shasum -a 256 ${{ steps.vars.outputs.archive }} > ${{ steps.vars.outputs.archive }}.sha256

      # --- Upload only on push (not PRs) ---
      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/SathwikB_automate_dockerimgpush'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_VOLUNTEER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_VOLUNTEER }}

      # Upload SHA-tagged image into /sha/
      - name: Upload image (versioned by commit SHA)
        if: github.event_name == 'push' && github.ref == 'refs/heads/SathwikB_automate_dockerimgpush'
        run: |
          aws s3 cp "${{ steps.vars.outputs.archive }}" \
            "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/sha/${{ steps.vars.outputs.archive }}"
          aws s3 cp "${{ steps.vars.outputs.archive }}.sha256" \
            "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/sha/${{ steps.vars.outputs.archive }}.sha256"

      # Upload "latest" pointer into /latest/
      - name: Upload image as latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/SathwikB_automate_dockerimgpush'
        run: |
          cp "${{ steps.vars.outputs.archive }}" "${{ env.APP_NAME }}-latest.tar.gz"
          cp "${{ steps.vars.outputs.archive }}.sha256" "${{ env.APP_NAME }}-latest.tar.gz.sha256"
          aws s3 cp "${{ env.APP_NAME }}-latest.tar.gz" \
            "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/latest/${{ env.APP_NAME }}-latest.tar.gz"
          aws s3 cp "${{ env.APP_NAME }}-latest.tar.gz.sha256" \
            "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/latest/${{ env.APP_NAME }}-latest.tar.gz.sha256"

      # Keep only the last 3 SHA-tagged builds
      # Keep only the last 3 SHA-tagged builds
      - name: Keep only last 3 SHA-tagged images
        if: github.event_name == 'push' && github.ref == 'refs/heads/SathwikB_automate_dockerimgpush'
        shell: bash
        run: |
          set -euo pipefail

          BUCKET="${{ env.S3_BUCKET }}"
          PREFIX="docker-images/${{ env.APP_NAME }}/dev/sha/"

          # Get only .tar.gz keys, newest first
          KEYS=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "$PREFIX" \
            --query 'reverse(sort_by(Contents[?ends_with(Key, `.tar.gz`)], &LastModified))[].Key' \
            --output text)

          if [ -z "$KEYS" ]; then
            echo "No .tar.gz images found under s3://$BUCKET/$PREFIX"
            exit 0
          fi

          # Turn tabs into newlines and count
          KEYS_NL=$(echo "$KEYS" | tr '\t' '\n')
          TOTAL=$(echo "$KEYS_NL" | wc -l | tr -d ' ')
          echo "Found $TOTAL .tar.gz images:"
          echo "$KEYS_NL"

          # Keep first 3 (newest). Delete the rest + their .sha256
          if [ "$TOTAL" -le 3 ]; then
            echo "Nothing to delete (<=3 images)."
            exit 0
          fi

          TO_DELETE=$(echo "$KEYS_NL" | tail -n +4)
          echo "Deleting these:"
          echo "$TO_DELETE"

          while IFS= read -r key; do
            [ -z "$key" ] && continue
            aws s3 rm "s3://$BUCKET/$key" || true
            aws s3 rm "s3://$BUCKET/${key}.sha256" || true
          done <<< "$TO_DELETE"

      # List objects after cleanup
      - name: "List objects after cleanup (sha & latest)"
        if: github.event_name == 'push' && github.ref == 'refs/heads/SathwikB_automate_dockerimgpush'
        run: |
          aws s3 ls "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/sha/"
          aws s3 ls "s3://${{ env.S3_BUCKET }}/docker-images/${{ env.APP_NAME }}/dev/latest/"